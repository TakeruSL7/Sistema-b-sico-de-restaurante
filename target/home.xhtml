<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="es" lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Tentación al paladar</title>
    <link rel="icon" type="image/png" href="resources/images/logo.png"/>    
	<style type="text/css">
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #43312c;
            color: #2b1d19;
        }

        /* --- SECCIÓN HERO (CON IMAGEN DE FONDO Y TINTE CAFÉ DE LOGO) --- */
        .hero-banner {
			/* Cambia 'resources/images/fondo-restaurante.jpg' por el nombre real de tu archivo */
            background: linear-gradient(rgba(160, 134, 125, 0.4), rgba(160, 134, 125, 0.4)), 
                        url('imagen.jpg') no-repeat center center;
            background-size: cover; /* Esto hace que la imagen cubra todo el espacio sin deformarse */
            
            color: #000000;
			text-decoration: underline;
            position: relative;
            padding: 80px 40px;
            
            display: flex;
            align-items: center;
            justify-content: center; 
            text-align: center;
            
            overflow: hidden;
            min-height: 300px;
        }

        .hero-left {
            max-width: 100%;
            z-index: 2;
        }

        .hero-title {
            font-size: 3.5rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            line-height: 0.95;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* --- SECCIÓN DE ORDEN / OPCION (TONOS DE TU PANEL IZQUIERDO) --- */
        .order-section {
            padding: 50px 20px;
            text-align: center;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .option-card {
            background-color: #694f46;
            color: #ffffff;
            width: 320px;
            padding: 25px 20px;
            border-radius: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0px 5px 15px rgb(0, 0, 0);
            transition: background-color 0.2s, transform 0.2s;
        }

        .option-card:hover {
            background-color:#b0948a; 
            transform: scale(1.03);
            color: rgb(0, 0, 0);
        }

        .icon-placeholder {
            width: 60px;
            height: 60px;
            border: 2px solid rgb(0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 50%;
            background-color: #996656;
        }

        .option-text {
            text-align: left;
        }

        .option-main {
            font-size: 1.3rem;
            text-transform: uppercase;
            display: block;
            line-height: 1.1;
        }
    </style>
</head>
<body>
    <div>
        <div class="hero-banner">
            <div class="hero-left">
                <img src="resources/images/Titulo.png" height="80"
                     style="display:block;margin:0 auto" alt="Titulo"
                     onerror="this.style.display='none'"/>
                <h1 class="hero-title">TENTACIÓN AL PALADAR</h1>
            </div>
        </div>
    </div>

    <div class="order-section">
        <div class="options-container">
            <a href="menu.xhtml" class="option-card">
                <div class="icon-placeholder"><h1>📓</h1></div>
                <div class="option-text">
                    <span class="option-main">MENÚ</span>
                </div>
            </a>

            <a href="index.xhtml" class="option-card">
                <div class="icon-placeholder"><h1>🍽️</h1></div>
                <div class="option-text">
                    <span class="option-main">RESERVA</span>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
